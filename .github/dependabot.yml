version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 50
    # pnpm-workspace.yaml の minimumReleaseAge (7日) に合わせる。
    # サプライチェーン攻撃で公開されたマルウェアの発見・unpublish猶予期間。
    cooldown:
      default-days: 7
    groups:
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
          - "@smithy/*"

  # SHA固定したActionsの追従用。Dependabotがコメント形式の "# vX.Y.Z" を
  # 維持しつつSHAを最新版に更新するPRを作る。
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
