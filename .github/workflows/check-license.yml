name: License Check

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  license-check:
    name: Check License Pollution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v4.4.0
        with:
          version: 11
          run_install: true
      - run: pnpm jsgl --local ./packages/vitest-dynamodb-lite/
